name: Deploy HRMS to EC2

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate TanStack Router route tree
        working-directory: apps/frontend
        run: bunx @tanstack/router-cli@1.163.3 generate

      - name: Type check
        run: bun run type-check

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.APP_PUBLIC_ORIGIN }}
        run: bun run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate TanStack Router route tree
        working-directory: apps/frontend
        run: bunx @tanstack/router-cli@1.163.3 generate

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.APP_PUBLIC_ORIGIN }}
        run: bun run build

      - name: Install rsync and SSH client
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: Configure SSH key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s" "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directories exist
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "mkdir -p /srv/hrms/app /srv/hrms/app/apps/frontend/dist /srv/hrms/app/apps/backend/dist"

      - name: Sync repository payload
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".turbo" \
            --exclude ".env" \
            --exclude ".github" \
            --exclude "apps/frontend/dist" \
            --exclude "apps/backend/dist" \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/srv/hrms/app/"

      - name: Sync frontend build artifact
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./apps/frontend/dist/ \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/srv/hrms/app/apps/frontend/dist/"

      - name: Sync backend build artifact
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./apps/backend/dist/ \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/srv/hrms/app/apps/backend/dist/"

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" <<'EOF'
          export BUN_INSTALL="$HOME/.bun"
          export PATH="$BUN_INSTALL/bin:$PATH"

          cp /srv/hrms/shared/.env.production /srv/hrms/app/.env
          cd /srv/hrms/app

          bun install --frozen-lockfile
          bun run --filter @hrms/backend db:migrate

          sudo systemctl restart hrms-backend
          sudo nginx -t
          sudo systemctl reload nginx
          EOF
