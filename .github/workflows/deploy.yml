name: Deploy HRMS to EC2

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate TanStack Router route tree
        working-directory: apps/frontend
        run: bunx @tanstack/router-cli@1.163.3 generate

      - name: Type check
        run: bun run type-check

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.APP_PUBLIC_ORIGIN }}
        run: bun run build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate TanStack Router route tree
        working-directory: apps/frontend
        run: bunx @tanstack/router-cli@1.163.3 generate

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.APP_PUBLIC_ORIGIN }}
        run: bun run build

      - name: Install rsync and SSH client
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: Configure SSH key
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -eu

          host=$(printf "%s" "$EC2_HOST" | tr -d '\r\n' | xargs)
          user=$(printf "%s" "$EC2_USER" | tr -d '\r\n' | xargs)

          if [ -z "$host" ]; then
            echo "EC2_HOST secret is empty"
            exit 1
          fi

          if [ -z "$user" ]; then
            echo "EC2_USER secret is empty"
            exit 1
          fi

          if [[ "$host" == *"YOUR_EC2_PUBLIC_IP"* ]] || \
             [[ "$host" == *"your-domain.example"* ]] || \
             [[ "$host" == *"***"* ]] || \
             [[ "$host" == *" "* ]] || \
             [[ "$host" == *"://"* ]] || \
             [[ "$host" == */* ]] || \
             [[ "$host" == *"@"* ]]; then
            echo "EC2_HOST secret is invalid: use only a hostname or IP address, with no scheme, path, or username"
            exit 1
          fi

          if [ -z "$EC2_SSH_KEY" ]; then
            echo "EC2_SSH_KEY secret is empty"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf "%s" "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keyscan -T 30 -H "$host" >> ~/.ssh/known_hosts; then
            echo "Unable to resolve or reach EC2_HOST for ssh-keyscan. Check the EC2_HOST secret value and DNS/network accessibility from GitHub Actions."
            exit 1
          fi

          {
            echo "DEPLOY_HOST=$host"
            echo "DEPLOY_USER=$user"
          } >> "$GITHUB_ENV"

      - name: Ensure remote directories exist
        run: |
          set -eu
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p /srv/hrms/app /srv/hrms/app/apps/frontend/dist /srv/hrms/app/apps/backend/dist"

      - name: Sync repository payload
        run: |
          set -eu
          rsync -avz --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".turbo" \
            --exclude ".env" \
            --exclude ".github" \
            --exclude "apps/frontend/dist" \
            --exclude "apps/backend/dist" \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ \
            "$DEPLOY_USER@$DEPLOY_HOST:/srv/hrms/app/"

      - name: Sync frontend build artifact
        run: |
          set -eu
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./apps/frontend/dist/ \
            "$DEPLOY_USER@$DEPLOY_HOST:/srv/hrms/app/apps/frontend/dist/"

      - name: Sync backend build artifact
        run: |
          set -eu
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./apps/backend/dist/ \
            "$DEPLOY_USER@$DEPLOY_HOST:/srv/hrms/app/apps/backend/dist/"

      - name: Deploy on EC2
        run: |
          set -eu
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" <<'EOF'
          export BUN_INSTALL="$HOME/.bun"
          export PATH="$BUN_INSTALL/bin:$PATH"

          cp /srv/hrms/shared/.env.production /srv/hrms/app/.env
          cd /srv/hrms/app

          bun install --frozen-lockfile
          bun run --filter @hrms/backend db:migrate

          sudo systemctl restart hrms-backend
          sudo nginx -t
          sudo systemctl reload nginx
          EOF
